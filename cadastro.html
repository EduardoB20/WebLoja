<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Web Loja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
        <a href="index.html" class="logo">Web<span>Loja</span></a>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="produtos.html">Sites</a></li>
                <li><a href="contato.html">Área dev</a></li>
                <li id="menu-login"><a href="cadastro.html">Entrar</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 0.5rem;">Acesse sua Conta</h2>
            <p style="text-align: center; color: var(--text-light); margin-bottom: 2rem;">Entre para comprar ou conversar com nossos devs.</p>
            
            <form id="formCadastro">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="Mínimo 6 caracteres">
                </div>

                <div id="mensagem" style="margin-bottom: 1.5rem; font-weight: 600; text-align: center;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;">Entrar na Plataforma</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Web Loja. Todos os direitos reservados. | <a href="sobre.html" style="color: var(--accent); text-decoration: none;">Sobre a Empresa</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
